name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java (required by Gradle / Android SDK) ─────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Set up Flutter ──────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'   # Update to your minimum required version
          channel: stable
          cache: true

      # ── 4. Cache pub packages ──────────────────────────────────────────────
      - name: Cache Flutter pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      # ── 5. Install dependencies ────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 6. Lint & analyse ─────────────────────────────────────────────────
      - name: Run Flutter analysis
        run: flutter analyze --no-fatal-infos

      # ── 7. Run tests (if any) ──────────────────────────────────────────────
      - name: Run unit tests
        run: flutter test
        continue-on-error: true   # Remove once tests are added

      # ── 8. Build release APK ──────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release --no-shrink

      # ── 9. Upload APK artifact ─────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nemotron-code-release-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error
